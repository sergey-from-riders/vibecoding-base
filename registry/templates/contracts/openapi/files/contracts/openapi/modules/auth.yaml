paths:
  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register account
      operationId: authRegister
      description: Create inactive account and issue activation flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 12
            examples:
              owner:
                value:
                  email: owner@example.test
                  password: "example-password-only"
              admin:
                value:
                  email: admin@example.test
                  password: "example-password-only"
      responses:
        '201':
          description: Registration accepted
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: activation_required
              examples:
                created:
                  value:
                    status: activation_required
        '422':
          description: Validation error
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                $ref: ../openapi.root.yaml#/components/schemas/Problem
              examples:
                invalid_email:
                  value:
                    status: fix_required
                    title: Validation required
                    detail: Исправьте email и повторите запрос.
                    action: Проверьте validate email
                    validate: email
                    request_id: req_01HPX4K9V7F5Q3Q0M3X6B8N1TZ
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.example.test/api/v1/auth/register \
              -H 'Content-Type: application/json' \
              -d '{"email":"owner@example.test","password":"example-password-only"}'

  /api/v1/auth/activate:
    post:
      tags: [auth]
      summary: Activate account
      operationId: authActivate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
            examples:
              activation:
                value:
                  token: act_6d2f8e0a4f
      responses:
        '200':
          description: Activated
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: activated
              examples:
                ok:
                  value:
                    status: activated
        '400':
          description: Bad token
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                $ref: ../openapi.root.yaml#/components/schemas/Problem
              examples:
                invalid:
                  value:
                    status: fix_required
                    title: Activation validate required
                    detail: Проверьте activation token и повторите запрос.
                    action: Проверьте validate token
                    validate: token
                    request_id: req_01HPX4K9V7F5Q3Q0M3X6B8N1TZ
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.example.test/api/v1/auth/activate \
              -H 'Content-Type: application/json' \
              -d '{"token":"act_6d2f8e0a4f"}'

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Login with email/password
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
            examples:
              primary:
                value:
                  email: owner@example.test
                  password: "example-password-only"
              secondary:
                value:
                  email: admin@example.test
                  password: "example-password-only"
      responses:
        '200':
          description: Authenticated
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                type: object
                required: [access_token, token_type, expires_in]
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 900
              examples:
                success:
                  value:
                    access_token: eyJhbGciOi...
                    token_type: Bearer
                    expires_in: 900
        '401':
          description: Invalid credentials
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                $ref: ../openapi.root.yaml#/components/schemas/Problem
              examples:
                wrong_password:
                  value:
                    status: fix_required
                    title: Sign-in validate required
                    detail: Исправьте email или password и повторите вход.
                    action: Проверьте validate email,password
                    validate: email,password
                    request_id: req_01HPX4K9V7F5Q3Q0M3X6B8N1TZ
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.example.test/api/v1/auth/login \
              -H 'Content-Type: application/json' \
              -d '{"email":"owner@example.test","password":"example-password-only"}'

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Logout current session
      operationId: authLogout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session revoked
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: revoked
              examples:
                revoked:
                  value:
                    status: revoked
        '401':
          description: Unauthorized
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                $ref: ../openapi.root.yaml#/components/schemas/Problem
              examples:
                unauthorized:
                  value:
                    status: fix_required
                    title: Session validate required
                    detail: Выполните вход и повторите запрос.
                    action: Проверьте validate access_token
                    validate: access_token
                    request_id: req_01HPX4K9V7F5Q3Q0M3X6B8N1TZ
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.example.test/api/v1/auth/logout \
              -H 'Authorization: Bearer <access_token>'

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      operationId: authRefresh
      security:
        - bearerAuth: []
      responses:
        '200':
