                value:
                  init_data: "query_id=AAE...&user=%7B...%7D&hash=..."
      responses:
        '200':
          description: Authenticated via Telegram
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                type: object
                required: [access_token, token_type, expires_in]
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
              examples:
                success:
                  value:
                    access_token: eyJhbGciOi...
                    token_type: Bearer
                    expires_in: 900
        '400':
          description: Invalid Telegram init data
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                $ref: ../openapi.root.yaml#/components/schemas/Problem
              examples:
                invalid_tg_data:
                  value:
                    status: fix_required
                    title: Telegram payload validate required
                    detail: Проверьте init_data и повторите запрос.
                    action: Проверьте validate init_data
                    validate: init_data
                    request_id: req_01HPX4K9V7F5Q3Q0M3X6B8N1TZ
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.example.test/api/v1/auth/telegram/miniapp \
              -H 'Content-Type: application/json' \
              -d '{"init_data":"query_id=AAE...&user=%7B...%7D&hash=..."}'

  /api/v1/auth/native/exchange:
    post:
      tags: [auth]
      summary: Native code exchange (Qt/Android)
      operationId: authNativeExchange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, code_verifier, state]
              properties:
                code:
                  type: string
                code_verifier:
                  type: string
                state:
                  type: string
            examples:
              qt:
                value:
                  code: oauth_code_abc
                  code_verifier: qJ4...k3
                  state: state_47f...
      responses:
        '200':
          description: Session created for native app
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                type: object
                required: [access_token, token_type, expires_in, device_credential]
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
                  device_credential:
                    type: string
              examples:
                success:
                  value:
                    access_token: eyJhbGciOi...
                    token_type: Bearer
                    expires_in: 900
                    device_credential: dcred_932...
        '400':
          description: Invalid exchange payload
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                $ref: ../openapi.root.yaml#/components/schemas/Problem
              examples:
                invalid_exchange:
                  value:
                    status: fix_required
                    title: Native exchange validate required
                    detail: Проверьте code, code_verifier и state, затем повторите запрос.
                    action: Проверьте validate code,code_verifier,state
                    validate: code,code_verifier,state
                    request_id: req_01HPX4K9V7F5Q3Q0M3X6B8N1TZ
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.example.test/api/v1/auth/native/exchange \
              -H 'Content-Type: application/json' \
              -d '{"code":"oauth_code_abc","code_verifier":"qJ4...k3","state":"state_47f..."}'

  /api/v1/auth/sessions:
