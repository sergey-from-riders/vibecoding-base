  /api/v1/auth/sessions/{session_id}:
    delete:
      tags: [auth]
      summary: Revoke one session
      operationId: authSessionRevoke
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
