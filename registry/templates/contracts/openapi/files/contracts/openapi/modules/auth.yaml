      responses:
        '200':
          description: Current authenticated user
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                $ref: ../openapi.root.yaml#/components/schemas/UserMe
              examples:
                me:
                  value:
                    user_id: e2f0d908-03d7-4ba0-9c76-f0d1553f7428
                    email: owner@example.test
                    current_company_id: b98772dd-7cf7-455d-a750-9ef142546b37
        '401':
          description: Unauthorized
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                $ref: ../openapi.root.yaml#/components/schemas/Problem
              examples:
                unauthorized:
                  value:
                    status: fix_required
                    title: Session validate required
                    detail: Выполните вход и повторите запрос.
                    action: Проверьте validate access_token
                    validate: access_token
                    request_id: req_01HPX4K9V7F5Q3Q0M3X6B8N1TZ
      x-codeSamples:
        - lang: curl
          source: |
            curl -L https://api.example.test/api/v1/auth/me \
              -H 'Authorization: Bearer <access_token>'

  /api/v1/auth/oauth/{provider}/start:
    get:
      tags: [auth]
      summary: OAuth start
      operationId: authOauthStart
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, yandex, vk]
      responses:
        '200':
          description: OAuth start metadata
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                type: object
                required: [auth_url, state]
                properties:
                  auth_url:
                    type: string
                  state:
                    type: string
              examples:
                metadata:
                  value:
                    auth_url: https://accounts.google.com/o/oauth2/v2/auth?...
                    state: state_47f...
        '302':
          description: Redirect to provider auth page
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
        '400':
          description: Unsupported provider
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                $ref: ../openapi.root.yaml#/components/schemas/Problem
              examples:
                bad_provider:
                  value:
                    status: fix_required
                    title: OAuth provider validate required
                    detail: Исправьте provider и повторите запрос.
                    action: Проверьте validate provider
                    validate: provider
                    request_id: req_01HPX4K9V7F5Q3Q0M3X6B8N1TZ
      x-codeSamples:
        - lang: curl
          source: |
            curl -L 'https://api.example.test/api/v1/auth/oauth/google/start'

  /api/v1/auth/oauth/{provider}/callback:
    get:
      tags: [auth]
      summary: OAuth callback
      operationId: authOauthCallback
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, yandex, vk]
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Callback processed
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: callback_processed
              examples:
                processed:
                  value:
                    status: callback_processed
        '302':
          description: Redirect to app/deep-link after identity mapping
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
        '400':
          description: Invalid callback payload
          headers:
            X-Request-Id:
              $ref: ../openapi.root.yaml#/components/headers/X-Request-Id
            X-App-Result:
              $ref: ../openapi.root.yaml#/components/headers/X-App-Result
            Content-Language:
              $ref: ../openapi.root.yaml#/components/headers/Content-Language
          content:
            application/json:
              schema:
                $ref: ../openapi.root.yaml#/components/schemas/Problem
              examples:
                invalid:
                  value:
                    status: fix_required
                    title: OAuth callback validate required
                    detail: Проверьте validate code,state и повторите запрос.
                    action: Проверьте validate code,state
                    validate: code,state
                    request_id: req_01HPX4K9V7F5Q3Q0M3X6B8N1TZ
      x-codeSamples:
        - lang: curl
          source: |
            curl -L 'https://api.example.test/api/v1/auth/oauth/google/callback?code=abc&state=state_47f'

  /api/v1/auth/telegram/miniapp:
