name: verify

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  starter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify offline gates
        run: pnpm run verify:offline

      - name: Verify contracts
        run: pnpm run verify:contracts
